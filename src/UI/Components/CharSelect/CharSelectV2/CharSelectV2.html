<div id="CharSelectV2">
	<ui-image src="login_interface/win_select2.bmp"></ui-image>
	<!-- BOX -->
	<div class="box_select"><ui-image src="login_interface/box_select.bmp"></ui-image></div>
	<canvas class="slot1" width="126" height="132"></canvas>
	<canvas class="slot2" width="126" height="132"></canvas>
	<canvas class="slot3" width="126" height="132"></canvas>
	<div class="timedelete slot1 hidden"></div>
	<div class="timedelete slot2 hidden"></div>
	<div class="timedelete slot3 hidden"></div>

	<!-- Arrows -->
	<ui-button class="arrow left" bg="scroll1left.bmp"></ui-button>
	<ui-button class="arrow right" bg="scroll1right.bmp"></ui-button>

	<!-- Slots infos -->
	<div class="slotinfo">
		<span class="number">0 / 27</span>
		<span class="content"></span>
	</div>

	<!-- Pages infos -->
	<div class="pageinfo"><span class="current">1</span> / <span class="count">9</span></div>

	<!-- Characters infos -->
	<div class="charinfo">
		<div class="name"></div>
		<div class="job"></div>
		<div class="lvl"></div>
		<div class="exp"></div>
		<div class="hp"></div>
		<div class="sp"></div>
		<div class="map"></div>
		<div class="str"></div>
		<div class="agi"></div>
		<div class="vit"></div>
		<div class="int"></div>
		<div class="dex"></div>
		<div class="luk"></div>
	</div>

	<!-- Buttons -->
	<div class="btns">
		<button class="btn delete">Delete</button>
		<button class="btn canceldelete">Undo Del</button>
		<button class="btn finaldelete">Confirm</button>
		<button class="btn cancel">Cancel</button>
		<button class="btn ok">Enter</button>
		<button class="btn make">Create</button>
	</div>
</div>
