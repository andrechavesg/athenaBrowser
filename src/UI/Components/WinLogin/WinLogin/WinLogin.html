<div id="WinLogin">
	<!-- Title bar overlay -->
	<div class="win-title-text">Log On</div>
	<!-- User Auth -->
	<label class="field-label id-label" for="WinLoginUser">ID</label>
	<input id="WinLoginUser" class="user" type="text" value="" />
	<label class="field-label pw-label" for="WinLoginPass">Password</label>
	<input id="WinLoginPass" class="pass" type="password" value="" />
	<button
		class="save"
		type="button"
		data-background="login_interface/chk_saveoff.bmp"
		data-preload="login_interface/chk_saveon.bmp"
	></button>

	<!-- Buttons -->
	<button class="btn signup" type="button">Create</button>
	<button class="btn connect" type="submit">Login</button>
	<button class="btn exit" type="button">Exit</button>
</div>
